name: Go CI

on:
  push:
    branches:
      - main
      - dev
      - staging

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build application
        run: go build -o app

      # -------- SECURITY SCAN (SOURCE CODE) --------
      - name: Scan filesystem for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      # -------- DOCKER LOGIN --------
      - name: Login into Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERUSERNAME }}
          password: ${{ secrets.DOCKERPASSWORD }}

      # -------- BUILD IMAGE --------
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERUSERNAME }}/newapp:${{ github.sha }} .

      - name: List Docker images
        run: docker images

      # -------- SECURITY SCAN (DOCKER IMAGE) --------
      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKERUSERNAME }}/newapp:${{ github.sha }}"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      # -------- PUSH IMAGE --------
      - name: Push image to registry
        run: docker push ${{ secrets.DOCKERUSERNAME }}/newapp:${{ github.sha }}

      # -------- UPDATE MANIFEST --------
      - name: Update image tag in manifest
        run: |
          sed -i "s|image:.*|image: ${{ secrets.DOCKERUSERNAME }}/newapp:${{ github.sha }}|" k8s_manifest/deploy.yaml