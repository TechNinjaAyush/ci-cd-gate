name: Go CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.25"

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test ./...
    - name: Build application
      run: go build -o app