name: Go CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build application
        run: go build -o app

      - name: Login into Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERUSERNAME }}
          password: ${{ secrets.DOCKERPASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERUSERNAME }}/newapp:${{ github.sha }} .

      - name: List Docker images
        run: docker images

      - name: Push image to registry
        run: docker push ${{ secrets.DOCKERUSERNAME }}/newapp:${{ github.sha }}

      - name: Update image tag in manifest
        run: |
          sed -i "s|image:.*|image: ${{ secrets.DOCKERUSERNAME }}/newapp:${{ github.sha }}|" k8s_manifest/deploy.yaml

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > base64 -d > $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: kubectl apply -f k8s_manifest/deploy.yaml 

      - name:  Check if file is deployed or not 
        run: kubectl get deployment  