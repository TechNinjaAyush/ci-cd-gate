
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  labels:
    app: my-app

spec:
  replicas: 3

  selector:
    matchLabels:
      app: my-app

  template:
    metadata:
      labels:
        app: my-app

    spec:
      containers:
      - name: demo-app
        image: ashkk220/newapp:eda1fb67d27d797ecc82a9fa99576b50cc8afc3a

        
        ports:
        - containerPort: 8080

        